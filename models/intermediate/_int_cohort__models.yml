version: 2

models:
  - name: int_user_cohort__attribution
    description: |
      Links users to their install attribution source (network, campaign, adgroup).
      Foundation table for user-level acquisition reporting.

      Grain: One row per user_id/platform combination
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - USER_ID
              - PLATFORM
          config:
            where: "INSTALL_TIME >= DATEADD(day, -60, CURRENT_DATE)"
    columns:
      - name: USER_ID
        description: Amplitude user ID (integer)
        data_tests:
          - not_null:
              config:
                where: "INSTALL_TIME >= DATEADD(day, -60, CURRENT_DATE)"
      - name: PLATFORM
        description: iOS or Android
        data_tests:
          - not_null:
              config:
                where: "INSTALL_TIME >= DATEADD(day, -60, CURRENT_DATE)"
          - accepted_values:
              arguments:
                values: ['iOS', 'Android']
              config:
                where: "INSTALL_TIME >= DATEADD(day, -60, CURRENT_DATE)"
      - name: ADJUST_DEVICE_ID
        description: Adjust device identifier (IDFV for iOS, GPS_ADID for Android)
      - name: AD_PARTNER
        description: Standardized partner name from network_mapping
      - name: NETWORK_NAME
        description: Raw network name from Adjust
      - name: CAMPAIGN_NAME
        description: Campaign name from Adjust
      - name: INSTALL_TIME
        description: Install timestamp
      - name: INSTALL_DATE
        description: Install date

  - name: int_user_cohort__metrics
    description: |
      Comprehensive user-level cohort metrics with revenue windows and retention flags.
      Joins Adjust installs with WGT.EVENTS data to calculate D1, D7, D30, D180, D365,
      and lifetime revenue per user.

      LTV windows: D1, D7, D30, D180, D365, Total
      Revenue splits: Total, Purchase (direct), Ad (indirect)

      Grain: One row per user_id/platform combination
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - USER_ID
              - PLATFORM
          config:
            where: "INSTALL_TIME >= DATEADD(day, -60, CURRENT_DATE)"
    columns:
      - name: USER_ID
        description: Amplitude user ID (integer)
        data_tests:
          - not_null:
              config:
                where: "INSTALL_TIME >= DATEADD(day, -60, CURRENT_DATE)"
      - name: PLATFORM
        description: iOS or Android
        data_tests:
          - not_null:
              config:
                where: "INSTALL_TIME >= DATEADD(day, -60, CURRENT_DATE)"
          - accepted_values:
              arguments:
                values: ['iOS', 'Android']
              config:
                where: "INSTALL_TIME >= DATEADD(day, -60, CURRENT_DATE)"
      - name: INSTALL_DATE
        description: Install date
      - name: INSTALL_TIME
        description: Install timestamp
      - name: D1_REVENUE
        description: Total revenue within 1 day of install
      - name: D7_REVENUE
        description: Total revenue within 7 days of install
      - name: D30_REVENUE
        description: Total revenue within 30 days of install
      - name: D180_REVENUE
        description: Total revenue within 180 days of install
      - name: D365_REVENUE
        description: Total revenue within 365 days of install
      - name: TOTAL_REVENUE
        description: Lifetime total revenue
      - name: D1_PURCHASE_REVENUE
        description: Purchase (IAP) revenue within 1 day of install
      - name: D7_PURCHASE_REVENUE
        description: Purchase (IAP) revenue within 7 days of install
      - name: D30_PURCHASE_REVENUE
        description: Purchase (IAP) revenue within 30 days of install
      - name: D180_PURCHASE_REVENUE
        description: Purchase (IAP) revenue within 180 days of install
      - name: D365_PURCHASE_REVENUE
        description: Purchase (IAP) revenue within 365 days of install
      - name: TOTAL_PURCHASE_REVENUE
        description: Lifetime purchase revenue
      - name: D1_AD_REVENUE
        description: Ad revenue within 1 day of install
      - name: D7_AD_REVENUE
        description: Ad revenue within 7 days of install
      - name: D30_AD_REVENUE
        description: Ad revenue within 30 days of install
      - name: D180_AD_REVENUE
        description: Ad revenue within 180 days of install
      - name: D365_AD_REVENUE
        description: Ad revenue within 365 days of install
      - name: TOTAL_AD_REVENUE
        description: Lifetime ad revenue
      - name: IS_D1_PAYER
        description: 1 if user made a purchase within 1 day, 0 otherwise
      - name: IS_D7_PAYER
        description: 1 if user made a purchase within 7 days, 0 otherwise
      - name: IS_D30_PAYER
        description: 1 if user made a purchase within 30 days, 0 otherwise
      - name: IS_D180_PAYER
        description: 1 if user made a purchase within 180 days, 0 otherwise
      - name: IS_D365_PAYER
        description: 1 if user made a purchase within 365 days, 0 otherwise
      - name: IS_PAYER
        description: 1 if user ever made a purchase, 0 otherwise
      - name: D1_RETAINED
        description: 1 if user had a session on D1, 0 otherwise
      - name: D7_RETAINED
        description: 1 if user had a session on D7, 0 otherwise
      - name: D30_RETAINED
        description: 1 if user had a session on D30, 0 otherwise
      - name: D180_RETAINED
        description: 1 if user had a session on D180, 0 otherwise
      - name: D365_RETAINED
        description: 1 if user had a session on D365, 0 otherwise
      - name: D1_MATURED
        description: 1 if user has been installed for at least 1 day
      - name: D7_MATURED
        description: 1 if user has been installed for at least 7 days
      - name: D30_MATURED
        description: 1 if user has been installed for at least 30 days
      - name: D180_MATURED
        description: 1 if user has been installed for at least 180 days
      - name: D365_MATURED
        description: 1 if user has been installed for at least 365 days
